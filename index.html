<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aditya ScholarHub</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

    <div class="bg-watermark">ADITYA SCHOLARHUB</div>

    <div class="login-container">
        <div class="brand-logo">WELCOME</div>
        <p class="brand-subtext">Sign in to continue to your dashboard</p>
        
        <div class="toggle-box">
            <div id="btn"></div>
            <button type="button" class="toggle-btn" onclick="showLogin()">Log In</button>
            <button type="button" class="toggle-btn" onclick="showSignup()">Sign Up</button>
        </div>

        <div class="form-box">
            <form id="loginForm" class="input-group" onsubmit="handleLogin(event)">
                <input type="email" class="input-field" placeholder="Email Address" required>
                <input type="password" class="input-field" placeholder="Password" required>
                
                <div class="role-selector">
                    <label><input type="radio" name="loginRole" value="student" checked> Student</label>
                    <label><input type="radio" name="loginRole" value="mentor"> Mentor</label>
                </div>

                <button type="submit" class="submit-btn">Login to Dashboard</button>
            </form>

            <form id="signupForm" class="input-group" style="left: 450px;" onsubmit="handleLogin(event)">
                <input type="text" class="input-field" placeholder="Full Name" required>
                <input type="email" class="input-field" placeholder="College Email" required>
                <input type="password" class="input-field" placeholder="Create Password" required>
                
                <div class="role-selector">
                    <label><input type="radio" name="signupRole" value="student" checked> Student</label>
                    <label><input type="radio" name="signupRole" value="mentor"> Mentor</label>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
