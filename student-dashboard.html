<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Aditya ScholarHub</title>
    <!-- Link to external dashboard stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Left Navigation Sidebar for Academic Subjects -->
    <div class="sidebar">
        <div class="logo">ScholarHub</div>
        
        <!-- New Section Heading -->
        <div class="sidebar-category">Courses</div>
        
        <!-- Degree Course Categories -->
        <button class="subject-btn" onclick="showMentors('BSc - Computer Science')">BSc - Computer Science</button>
        <button class="subject-btn" onclick="showMentors('BSc - Data Science')">BSc - Data Science</button>
        <button class="subject-btn" onclick="showMentors('BSc - Artificial Intelligence')">BSc - AI</button>
        <button class="subject-btn" onclick="showMentors('BSc - Chemistry')">BSc - Chemistry</button>
        <button class="subject-btn" onclick="showMentors('BCA - Data Science')">BCA - Data Science</button>
        <button class="subject-btn" onclick="showMentors('BCom')">BCom</button>
        <button class="subject-btn" onclick="showMentors('BBA')">BBA</button>
    </div>

    <!-- Top Right Profile Container -->
    <div class="top-profile-container">
        <!-- Profile Avatar Trigger -->
        <div class="profile-avatar" onclick="toggleProfileDropdown()">S</div>
        
        <!-- Hidden Dropdown Menu Container -->
        <div class="profile-dropdown-menu" id="profileMenu">
            <p><strong>Name:</strong> Student Name</p>
            <p><strong>SUC:</strong> 12345678</p>
            <p><strong>Email:</strong> student@aditya.edu.in</p>
            <!-- Logout Redirect Button -->
            <button class="logout-btn" onclick="window.location.href='index.html'">Log Out</button>
        </div>
    </div>

    <!-- Middle Feed Column for Available Domain Mentors -->
    <div class="mentors-section" id="mentorsSection">
        <div class="section-title">Select a Mentor</div>
        <div id="mentorsList">
            <!-- Mentors items will be loaded dynamically via JavaScript -->
        </div>
    </div>

    <!-- Default Landing Welcome Interface -->
    <div class="welcome-msg" id="welcomeMsg">
        <h2>Welcome to Aditya ScholarHub</h2>
        <p>Select your course from the left to ask doubts to your respective teachers.</p>
    </div>

    <!-- Right Interaction Window for Doubt Submission -->
    <div class="chat-section" id="chatSection">
        <div class="chat-header">
            <div class="mentor-avatar" id="activeMentorAvatar">M</div>
            <span id="activeMentorName">Mentor Name</span>
        </div>
        
        <div class="chat-body" id="chatBody">
            <!-- Dialogue messages container -->
        </div>

        <div class="chat-footer">
            <div class="input-group">
                <!-- Media and attachment upload functionality trigger -->
                <button class="img-btn" onclick="alert('Image upload box will open here!')">➕ Image</button>
                <textarea class="doubt-box" placeholder="Type your doubt here..." id="doubtText"></textarea>
                <button class="send-btn" onclick="sendDoubt()">Send</button>
            </div>
        </div>
    </div>

    <!-- Link to external dashboard javascript logical operations -->
    <script src="script.js"></script>
</body>
</html>
