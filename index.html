<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya ScholarHub</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

    <div class="header-nav">
        <a href="#" class="nav-link">❓ Help</a>
        <a href="#" class="nav-link">ⓘ About Us</a>
        <button class="nav-btn" onclick="openModal('login')">Log In</button>
        <button class="nav-btn signup-btn" onclick="openModal('signup')">Sign Up</button>
    </div>

    <div class="main-landing-area">
        <img src="logo.png" alt="Aditya Logo" class="main-logo" onerror="this.style.display='none'">
        <h1 class="main-title">Aditya ScholarHub</h1>
        <p class="main-subtitle">Empowering Students, Connecting Mentors</p>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="login-container">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            
            <h2 style="color: white; margin-bottom: 20px;">WELCOME</h2>
            
            <div class="toggle-box">
                <div id="btn"></div>
                <button type="button" class="toggle-btn" onclick="showLogin()">Log In</button>
                <button type="button" class="toggle-btn" onclick="showSignup()">Sign Up</button>
            </div>

            <div class="form-box">
                <form id="loginForm" class="input-group" onsubmit="handleLogin(event)">
                    <input type="email" class="input-field" placeholder="Email Address" required>
                    <input type="password" class="input-field" placeholder="Password" required>
                    
                    <div class="role-selector">
                        <label><input type="radio" name="loginRole" value="student" checked> Student</label>
                        <label><input type="radio" name="loginRole" value="mentor"> Mentor</label>
                    </div>

                    <button type="submit" class="submit-btn">Login to Dashboard</button>
                </form>

                <form id="signupForm" class="input-group" style="left: 450px;" onsubmit="handleLogin(event)">
                    <input type="text" class="input-field" placeholder="Full Name" required>
                    <input type="email" class="input-field" placeholder="Email" required>
                    <input type="text" class="input-field" placeholder="Enter SUC Code" required>
                    <input type="password" class="input-field" placeholder="Create Password" required>
                    
                    <div class="role-selector">
                        <label><input type="radio" name="signupRole" value="student" checked> Student</label>
                        <label><input type="radio" name="signupRole" value="mentor"> Mentor</label>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
